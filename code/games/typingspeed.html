<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Typer Race</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #39ff14; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow-x: hidden; }
        
        /* Name Input Overlay */
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-box { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 2px solid var(--neon-blue); text-align: center; }
        .setup-box input { padding: 12px; font-size: 1.2rem; border-radius: 8px; border: none; width: 250px; margin-bottom: 20px; text-align: center; }

        .game-header { position: sticky; top: 0; background: #121212; width: 100%; text-align: center; z-index: 100; padding: 15px 0; border-bottom: 2px solid #333; }
        .game-container { width: 100%; max-width: 1000px; background: #1e1e1e; padding: 25px; border-radius: 15px; margin-top: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        #countdown-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10%; height: 50%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; font-size: 5rem; color: var(--neon-blue); font-weight: bold; }

        /* Track Area */
        .track-area { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .lane { position: relative; height: 40px; border-bottom: 1px dashed #444; display: flex; align-items: center; }
        .lane-label { position: absolute; left: -10px; top: 5px; font-size: 0.7rem; color: #888; text-transform: uppercase; }
        
        .car { position: absolute; left: 0; width: 50px; height: auto; transition: left 0.1s linear; z-index: 5; }
        .finish-line { position: absolute; right: 30px; top: 0; bottom: 0; width: 12px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); border: 1px solid #555; }

        .quote-box { 
            background: #000; padding: 20px; border-radius: 10px; font-size: 1.25rem; 
            margin-bottom: 15px; border-left: 5px solid var(--neon-blue); 
            max-height: 180px; overflow-y: auto; line-height: 1.6; text-align: justify;
        }
        .char { color: #444; transition: color 0.1s; }
        .correct { color: var(--neon-green); text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }
        .incorrect { color: #ff4757; background: rgba(255, 71, 87, 0.2); border-radius: 2px; }

        textarea { 
            width: 100%; height: 20px; padding: 15px; font-size: 1.1rem; 
            border-radius: 10px; border: 2px solid #444; background: #2d2d2d; 
            color: white; outline: none; box-sizing: border-box; resize: none;
        }
        textarea:focus { border-color: var(--neon-blue); }

        /* Results */
        #result-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #111; padding: 30px; border-radius: 15px; text-align: center; z-index: 1000; width: 400px; box-shadow: 0 0 100px #000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; }
        table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        th { background: #f4f4f4; }
        td, th { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .user-row { background: #d1f2eb; font-weight: bold; }
        .btn-next { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

<div id="setup-overlay">
    <div class="setup-box">
        <h1 style="color: var(--neon-blue); margin-top: 0;">🏎️ TURBO TYPER</h1>
        <p>Enter your racer name to begin:</p>
        <input type="text" id="username-input" placeholder="Your Name..." maxlength="12">
        <br>
        <button class="btn-next" onclick="saveName()">START ENGINE</button>
    </div>
</div>

<div class="game-header">
    <h2 style="margin: 0; color: var(--neon-blue);">RACE TRACK - LEVEL <span id="lvl-num">1</span></h2>
</div>

<div class="game-container">
    <div id="countdown-box"></div>
    
    <div class="track-area">
        <div class="lane">
            <span class="lane-label" id="label-user">USER</span>
            <img id="p-car" class="car" src="user1.jpg" alt="Player">
            <div class="finish-line"></div>
        </div>
        <div class="lane">
            <span class="lane-label">Player 1 (Guest)</span>
            <img id="b1-car" class="car" src="user2.jpg" alt="Guest 1">
            <div class="finish-line"></div>
        </div>
        <div class="lane">
            <span class="lane-label">Player 2 (Guest)</span>
            <img id="b2-car" class="car" src="user3.jpg" alt="Guest 2">
            <div class="finish-line"></div>
        </div>
    </div>

    <div id="quote-display" class="quote-box"></div>
    <textarea id="typer-input" placeholder="Wait for GO!..." disabled></textarea>
</div>

<div id="overlay" class="overlay"></div>
<div id="result-modal">
    <h2 style="margin-top:0">🏁 RACE RESULTS</h2>
    <table>
        <thead><tr><th>Rank</th><th>Racer</th><th>WPM</th><th>Time</th></tr></thead>
        <tbody id="leaderboard"></tbody>
    </table>
    <button class="btn-next" onclick="startCountdown()">RACE AGAIN</button>
</div>

<script>
    const QUOTES = [

		"The digital landscape is a vast ocean of possibilities where every word typed is a drop in the sea of universal knowledge. Accuracy is the compass that guides your thoughts to the right destination, ensuring that your message remains clear and impactful. Keep your focus sharp and your fingers moving with a sense of purpose, because in the realm of technology, the ability to communicate quickly and effectively is a superpower. As you navigate through complex data and creative ideas, remember that every small movement contributes to a much larger picture of digital literacy and professional growth.",
		"Learning a new skill requires an immense amount of patience, persistence, and a consistently positive mindset to overcome the initial hurdles. The rhythm of the keyboard is like a heartbeat for the modern professional, echoing the pulse of an interconnected global economy that never sleeps. Practice today so that your future self can navigate the digital world with effortless grace and a level of competence that sets you apart from the crowd. It is the small, repetitive actions performed with high quality that eventually lead to the mastery of any complex craft or technical discipline.",
		"Innovation is the spark that ignites the engine of progress across all industries, from healthcare and engineering to the creative arts and beyond. A single idea, captured through a series of rapid and precise keystrokes, has the latent power to change lives and disrupt traditional ways of thinking. Never underestimate the profound impact of a well-written sentence in a global conversation that values both speed and depth of insight. As technology evolves, our capacity to adapt and utilize these tools effectively will determine the trajectory of our collective future and individual success.",
		"Nature provides a perfect example of balance and harmony in an ever-changing environment that demands constant adaptation and resilience. Just as a river flows steadily toward the sea, carving its path through solid rock over millennia, your typing should be fluid, consistent, and remarkably resilient. Find your natural pace, embrace the flow of your thoughts, and let your internal creativity take the lead without being hindered by technical limitations. When the mind and the hand work in perfect synchronization, the barrier between thought and execution begins to disappear entirely.",
		"Success is not a final destination but a continuous, lifelong journey of self-improvement, learning, and the pursuit of excellence in every endeavor. Each mistake encountered is not a failure but a golden opportunity to refine your technique and build better habits that will serve you for years to come. Stay deeply committed to the process of growth, and the results will eventually speak for themselves through your increased efficiency and confidence. Excellence is a habit formed in the quiet moments of practice, long before the world sees the finished product of your hard work.",
		"The art of effective communication is essential for building strong relationships and navigating the complexities of successful modern careers. Whether you are writing a simple email to a colleague or a complex technical report for a global audience, clarity is always your best friend and most trusted ally. Choose your words wisely, deliver them with confidence, and maintain a speed that allows your brain to stay ahead of your hands. In an age of information overload, the person who can synthesize and share ideas the most effectively is the one who will truly lead.",
		"Time is undeniably the most valuable resource we possess, and efficiency is the ultimate key to unlocking its full potential in our daily lives. Mastering the layout of your digital tools allows you to work smarter, not harder, freeing up mental energy for higher-level problem solving and creative thinking. Turn your daily tasks into a masterpiece of productivity and streamlined effort by focusing on the mechanics of your work until they become second nature. When you no longer have to think about 'how' to type, you can spend all your energy on 'what' to create.",
		"Dreams are the detailed blueprints of our future reality, waiting patiently to be constructed by the bricks of hard work and the mortar of dedication. Typing out your goals makes them feel more tangible, structured, and achievable than if they were simply fleeting thoughts in a busy mind. Take the process one character at a time, one sentence at a time, and watch your vision come to life on the screen with clarity and conviction. The distance between a dream and reality is narrowed significantly when you have the tools and the discipline to document your path forward.",
		"Great leaders are those who listen as much as they speak and act with a level of integrity that inspires everyone around them to do better. Information flows faster today than at any other point in human history, making the ability to process, filter, and respond a vital talent for any aspiring professional. Be the voice of reason in a crowded room of noise and constant distractions by focusing on quality over quantity in every digital interaction. Your words have weight, so ensure they are delivered with the precision and the care that they truly deserve.",
		"Consistency is the secret, often overlooked ingredient that turns an eager amateur into a seasoned expert with a formidable set of skills. Small, incremental daily improvements lead to massive long-term gains in any field of study, whether it be coding, writing, or mastering a new language. Keep your eyes fixed on the screen, your hands comfortably on the home row, and your mind focused entirely on the goal of becoming better than you were yesterday. The journey of a thousand miles begins with a single step, but it is completed by the thousands of steps that follow it.",
        "The quick brown fox jumps over the lazy dog in a race that never ends. Speed is not just about moving fast, but moving with precision and control. Every keystroke brings you closer to the finish line of excellence.",
        "Technology is best when it brings people together. Typing is the bridge between human thought and digital creation. Master the keyboard, and you master the gateway to the modern world's information."
    ];

    let userName = "YOU";
    let level = 1;
    let isRacing = false;
    let startTime;
    let racersFinished = [];
    let intervals = [];

    const input = document.getElementById('typer-input');
    const display = document.getElementById('quote-display');
    const countdownBox = document.getElementById('countdown-box');

    function saveName() {
        const name = document.getElementById('username-input').value.trim();
        if (name) {
            userName = name.toUpperCase();
            document.getElementById('label-user').innerText = userName;
            document.getElementById('setup-overlay').style.display = 'none';
            startCountdown();
        } else {
            alert("Please enter a name!");
        }
    }

    function startCountdown() {
        initUI();
        countdownBox.style.display = 'flex';
        let count = 3;
        const timer = setInterval(() => {
            if (count > 0) {
                countdownBox.innerText = count;
            } else if (count === 0) {
                countdownBox.innerText = "GO!";
            } else {
                clearInterval(timer);
                countdownBox.style.display = 'none';
                beginRace();
            }
            count--;
        }, 1000);
    }

    function initUI() {
        isRacing = false;
        racersFinished = [];
        intervals.forEach(clearInterval);
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('result-modal').style.display = 'none';
        
        const text = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        display.innerHTML = text.split('').map(char => `<span class="char">${char}</span>`).join('');
        display.scrollTop = 0; 
        
        document.querySelectorAll('.car').forEach(c => c.style.left = '0%');
        input.value = '';
        input.disabled = true;
        document.getElementById('lvl-num').innerText = level;
    }

    function beginRace() {
        isRacing = true;
        startTime = new Date();
        input.disabled = false;
        input.focus();
        startBots();
    }

    function startBots() {
        // Guest Players speed increases with level
        const bots = [
            { id: 'b1-car', name: 'Player 1', wpm: 25 + (level * 4) },
            { id: 'b2-car', name: 'Player 2', wpm: 40 + (level * 3) }
        ];

        bots.forEach(bot => {
            let progress = 0;
            const totalChars = display.innerText.length;
            // Calculating movement speed based on WPM
            const speedPerTick = (bot.wpm * 5 / 60) * 0.1;

            const timer = setInterval(() => {
                if (!isRacing) return;
                progress += speedPerTick;
                let percent = Math.min((progress / totalChars) * 82, 85); 
                document.getElementById(bot.id).style.left = percent + '%';

                if (progress >= totalChars) {
                    recordFinish(bot.name, bot.wpm);
                    clearInterval(timer);
                }
            }, 100);
            intervals.push(timer);
        });
    }

    input.addEventListener('input', () => {
        const chars = display.querySelectorAll('.char');
        const typed = input.value.split('');
        let correctCount = 0;

        chars.forEach((span, i) => {
            if (typed[i] == null) {
                span.className = 'char';
            } else if (typed[i] === span.innerText) {
                span.className = 'char correct';
                correctCount++;
            } else {
                span.className = 'char incorrect';
            }
        });

        // Auto-scroll logic
        const activeChar = display.querySelector('.char:not(.correct):not(.incorrect)');
        if (activeChar) activeChar.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // User Car moves based on progress
        let progressPercent = (typed.length / chars.length) * 82;
        document.getElementById('p-car').style.left = Math.min(progressPercent, 85) + '%';

        // Finish Check: Jab text ki length puri ho jaye
        if (typed.length >= chars.length) {
            const timeTaken = (new Date() - startTime) / 1000;
            // Actual WPM calculation: (Correct Characters / 5) / (Time in Minutes)
            const wpm = Math.round((correctCount / 5) / (timeTaken / 60));
            recordFinish(userName, wpm, timeTaken);
            showFinalResults();
        }
    });

    function recordFinish(name, wpm, time = null) {
        if (racersFinished.find(r => r.name === name)) return;
        const timeVal = time || ((new Date() - startTime) / 1000);
        racersFinished.push({ name, wpm, time: parseFloat(timeVal) });
    }

    function showFinalResults() {
        isRacing = false;
        // Ensuring bots are recorded if user finishes very fast
        if (racersFinished.length < 3) {
            if (!racersFinished.find(r => r.name === 'Player 1')) recordFinish('Player 1', 30);
            if (!racersFinished.find(r => r.name === 'Player 2')) recordFinish('Player 2', 45);
        }

        const sorted = [...racersFinished].sort((a, b) => a.time - b.time);
        const leaderboard = document.getElementById('leaderboard');
        leaderboard.innerHTML = '';
        
        sorted.forEach((r, i) => {
            leaderboard.innerHTML += `
                <tr class="${r.name === userName ? 'user-row' : ''}">
                    <td>${i+1}</td>
                    <td>${r.name}</td>
                    <td>${r.wpm}</td>
                    <td>${r.time.toFixed(2)}s</td>
                </tr>`;
        });

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('result-modal').style.display = 'block';
        level++;
    }
</script>

</body>
</html>
