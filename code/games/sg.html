<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grass Snake Game - Mobile & PC</title>
    <style>
        /* CSS: डिजाइन और लेआउट */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a252f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            flex-direction: column;
            overflow: hidden; /* मोबाइल पर स्क्रॉलिंग रोकने के लिए */
            touch-action: manipulation;
        }

        .stats-panel {
            display: flex;
            gap: 20px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }

        canvas {
            border: 5px solid #2c3e50;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 90vw;
        }

        /* मोबाइल कंट्रोल्स (D-Pad) */
        .controls {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:active {
            background-color: #2ecc71;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }

        @media (min-width: 768px) {
            .controls { display: none; } /* PC पर बटन्स छिप जाएंगे */
        }
    </style>
</head>
<body>

    <div class="stats-panel">
        <div>स्कोर: <span id="scoreVal">0</span></div>
        <div>लेवल: <span id="levelVal">1</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button class="btn up" onclick="handleInput('UP')">▲</button>
        <button class="btn left" onclick="handleInput('LEFT')">◀</button>
        <button class="btn down" onclick="handleInput('DOWN')">▼</button>
        <button class="btn right" onclick="handleInput('RIGHT')">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const levelElement = document.getElementById("levelVal");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let level = 1;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        let foodX = 5, foodY = 5;
        let isGameOver = false;
        let changingDirection = false;

        // ग्रास बैकग्राउंड ड्राइंग
        function drawGrass() {
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    // शतरंज जैसा पैटर्न (लाइट और डार्क ग्रीन)
                    ctx.fillStyle = (i + j) % 2 === 0 ? "#2d5a27" : "#31642a";
                    ctx.fillRect(i * gridSize, j * gridSize, gridSize, gridSize);
                }
            }
        }

        function main() {
            if (isGameOver) {
                alert(`खेल समाप्त! स्कोर: ${score}`);
                location.reload();
                return;
            }

            changingDirection = false;
            // स्पीड कैलकुलेशन: शुरू में 200ms, फिर हर लेवल पर कम (तेज़) होगी
            let speed = Math.max(50, 200 - (level - 1) * 15);

            setTimeout(() => {
                drawGrass();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, speed);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? "#a2ff00" : "#2ecc71";
                ctx.strokeStyle = "#1b4d3e";
                
                // राउंडेड सांप
                const r = 5;
                const x = part.x * gridSize + 2;
                const y = part.y * gridSize + 2;
                const w = gridSize - 4;
                const h = gridSize - 4;
                
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, 6);
                ctx.fill();
                ctx.stroke();

                // आंखें (सिर्फ सिर पर)
                if(isHead) {
                    ctx.fillStyle = "black";
                    ctx.beginPath();
                    ctx.arc(x + 5, y + 5, 2, 0, Math.PI * 2);
                    ctx.arc(x + 11, y + 5, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawFood() {
            // लाल सेब
            ctx.fillStyle = "#ff3e3e";
            ctx.beginPath();
            ctx.arc(foodX * gridSize + 10, foodY * gridSize + 10, 8, 0, Math.PI * 2);
            ctx.fill();
            // डंठल
            ctx.fillStyle = "#4a2c2a";
            ctx.fillRect(foodX * gridSize + 9, foodY * gridSize + 2, 2, 4);
        }

        function advanceSnake() {
            if (dx === 0 && dy === 0) return; // जब तक गेम शुरू न हो

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                if (score % 50 === 0) {
                    level++;
                    levelElement.innerText = level;
                }
                createFood();
            } else {
                snake.pop();
            }

            if (checkCollision()) isGameOver = true;
        }

        function checkCollision() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount;
        }

        function createFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            snake.forEach(p => { if(p.x === foodX && p.y === foodY) createFood(); });
        }

        // इनपुट हैंडलर (Keyboard + Buttons)
        function handleInput(direction) {
            if (changingDirection) return;
            changingDirection = true;

            if (direction === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (direction === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (direction === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
            if (direction === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
        }

        // कीबोर्ड इवेंट
        document.addEventListener("keydown", (e) => {
            const key = e.keyCode;
            if (key === 37) handleInput('LEFT');
            if (key === 38) handleInput('UP');
            if (key === 39) handleInput('RIGHT');
            if (key === 40) handleInput('DOWN');
        });

        // गेम स्टार्ट
        createFood();
        main();

    </script>
</body>
</html>
