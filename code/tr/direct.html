        :root {

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg-color); 
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;

            height: 50px;

            justify-content: space-between; 
            align-items: center;
            padding: 0 20px;

            z-index: 100;

        #timer-display { font-size: 25px; color: Black; }

        /* Workspace with smooth scrolling */
        .main-workspace {
            flex: 1; 
            display: flex; 
            align-items: flex-start;
            justify-content: center;
            padding: 40px 2%; 
            background: White;
            overflow-y: auto;
            scroll-behavior: smooth; /* Smooth scroll effect */

        #text-box {
            font-size: 40px; 
            line-height: 1.5;

            text-align: left;

            max-width: 100%; 
            user-select: none;
            white-space: normal;
            word-wrap: break-word;
            position: relative;

        .current {

        .correct { color: green; font-weight: bold; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }

        let charIdx = 0;
    let errors = 0;
    let isRunning = false;
    let timeLeft = 0;
    let timerObj = null;
    let userName = "";

    const textBox = document.getElementById('text-box');
    const scrollContainer = document.getElementById('scroll-container');
    const timerDisplay = document.getElementById('timer-display');

    function launchApp() {
        userName = document.getElementById('name-input').value.trim();
	
        if(!userName) return alert("Naam likhna zaroori hai!");
        document.getElementById('name-modal').style.display = 'none';
        initText();
	        
    }

    function initText() {
        let passage = contentArray[Math.floor(Math.random() * contentArray.length)];
        textBox.innerHTML = passage.split('').map(char => `<span>${char}</span>`).join('');
        refreshCursor();
    }

    function refreshCursor() {
        const spans = textBox.querySelectorAll('span');
        spans.forEach(s => s.classList.remove('current'));
        
        if(charIdx < spans.length) {
            const currentSpan = spans[charIdx];
            currentSpan.classList.add('current');

            // --- Fixed Auto Scrolling Logic ---
            const spanTop = currentSpan.offsetTop;
            const lineHeight = 60; 
            const threshold = 180; // 3 lines approx

            if (spanTop > threshold) {
                // Scroll ko cursor ke saath sync rakhein
                scrollContainer.scrollTop = spanTop - threshold;
            } else {
                scrollContainer.scrollTop = 0;
            }
        }
    }

    window.addEventListener('keydown', (e) => {
        if(document.getElementById('name-modal').style.display !== 'none') return;
        if(document.getElementById('cert-screen').style.display === 'flex') return;

        // FIX: Space bar se hone wale automatic jump ko rokne ke liye
        if (e.key === " ") {
            e.preventDefault(); 
        }

        const spans = textBox.querySelectorAll('span');

        if(!isRunning && e.key.length === 1) {
            isRunning = true;
            timeLeft = parseInt(document.getElementById('time-limit').value);
            timerObj = setInterval(() => {
                timeLeft--;
                let min = Math.floor(timeLeft/60);
                let sec = timeLeft%60;
                timerDisplay.innerText = `${min<10?'0':''}${min}:${sec<10?'0':''}${sec}`;
                if(timeLeft <= 0) finishTest();
            }, 1000);
        }

        if(e.key === "Backspace") {
            if(charIdx > 0) {
                charIdx--;
                spans[charIdx].classList.remove('correct', 'wrong');
                refreshCursor();
            }
            return;
        }

        if(charIdx < spans.length && e.key.length === 1) {
            if(e.key === spans[charIdx].innerText) {
                spans[charIdx].classList.add('correct');
                charIdx++;
            } else {
                let lastErrors = 0;
                if(charIdx > 0 && spans[charIdx-1].classList.contains('wrong')) lastErrors++;
                if(lastErrors < 1) { 
                    spans[charIdx].classList.add('wrong');
                    charIdx++;
                    errors++;
                    triggerShake();
                } else {
                    triggerShake();
                }
            }
            refreshCursor();
        }
        if(charIdx === spans.length) finishTest();
    });

    function triggerShake() {
        textBox.classList.add('shake');
        setTimeout(() => textBox.classList.remove('shake'), 200);
    }

    function finishTest() {
        clearInterval(timerObj);
        document.getElementById('cert-screen').style.display = 'flex';
        document.getElementById('cert-user-name').innerText = userName;
        const timeLimit = parseInt(document.getElementById('time-limit').value);
        const timeSpent = (timeLimit - timeLeft) / 60;
        const wpm = Math.round((charIdx / 5) / (timeSpent || 1));
        const acc = Math.round(((charIdx - errors) / charIdx) * 100) || 0;
        document.getElementById('final-wpm').innerText = wpm;
        document.getElementById('final-acc').innerText = acc + "%";
        document.getElementById('cert-date').innerText = "Dated: " + new Date().toLocaleDateString();
    }

    window.addEventListener('keydown', (e) => { if(e.key === "Escape") location.reload(); });
</script>
