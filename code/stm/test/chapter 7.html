<script>
const data = [
    {q:"DBMS का पूर्ण रूप क्या है?", o:["Data Business Management System","Database Management System","Database Member System","Data Base Model System"], a:"B", e:"यह डेटाबेस को मैनेज करने वाला सॉफ्टवेयर है।"},
    {q:"डेटाबेस में डेटा को किस रूप में स्टोर किया जाता है?", o:["Files","Tables","Folders","Text"], a:"B", e:"Relational DBMS में डेटा रो (Rows) और कॉलम (Columns) की टेबल में होता है।"},
    {q:"इनमें से कौन सा एक DBMS सॉफ्टवेयर नहीं है?", o:["MySQL","Oracle","MS Access","HTML"], a:"D", e:"HTML एक मार्कअप भाषा है, DBMS नहीं।"},
    {q:"SQL का पूर्ण रूप क्या है?", o:["Structured Query Language","Simple Queue Language","Safe Query Logic","Standard Query List"], a:"A", e:"यह रिलेशनल डेटाबेस से बात करने की मानक भाषा है।"},
    {q:"डेटाबेस में एक 'Row' को और क्या कहा जाता है?", o:["Field","Record/Tuple","Attribute","Entity"], a:"B", e:"एक पूरी रो को रिकॉर्ड या टपल (Tuple) कहा जाता है।"},
    {q:"डेटाबेस में एक 'Column' को और क्या कहा जाता है?", o:["Record","Tuple","Attribute/Field","Instance"], a:"C", e:"कॉलम को एट्रिब्यूट या फील्ड भी कहते हैं।"},
    {q:"प्राइमरी की (Primary Key) की मुख्य विशेषता क्या है?", o:["यह डुप्लीकेट हो सकती है","यह कभी खाली (Null) नहीं हो सकती और यूनिक होती है","यह सिर्फ नंबर हो सकती है","None"], a:"B", e:"Primary Key टेबल में हर रिकॉर्ड को यूनिक बनाती है और Null नहीं हो सकती।"},
    {q:"दो टेबल्स के बीच संबंध बनाने के लिए किस की (Key) का उपयोग होता है?", o:["Primary Key","Foreign Key","Candidate Key","Local Key"], a:"B", e:"Foreign Key एक टेबल की Primary Key होती है जो दूसरी टेबल में उपयोग होती है।"},
    {q:"ER Model में 'E' का क्या अर्थ है?", o:["Element","Entry","Entity","Extra"], a:"C", e:"ER का मतलब Entity-Relationship मॉडल है।"},
    {q:"ER Diagram में 'Rectangle' क्या दर्शाता है?", o:["Attribute","Relationship","Entity Set","Weak Entity"], a:"C", e:"एंटीटी को आयत (Rectangle) से दर्शाया जाता है।"},

    {q:"ER Diagram में 'Diamond' क्या दर्शाता है?", o:["Attribute","Entity","Relationship","Primary Key"], a:"C", e:"रिलेशनशिप को डायमंड शेप से दिखाया जाता है।"},
    {q:"DBMS का मुख्य लाभ क्या है?", o:["Data Redundancy कम करना","Data Security बढ़ाना","Data Sharing आसान बनाना","उपरोक्त सभी"], a:"D", e:"यह सभी डेटाबेस मैनेजमेंट के मुख्य फायदे हैं।"},
    {q:"'Data Redundancy' का क्या अर्थ है?", o:["डेटा चोरी होना","डेटा का डुप्लीकेशन (एक ही डेटा बार-बार आना)","डेटा डिलीट होना","None"], a:"B", e:"एक ही जानकारी का कई जगह स्टोर होना रिडंडेंसी कहलाता है।"},
    {q:"Normalization का मुख्य उद्देश्य क्या है?", o:["डेटा बढ़ाना","रिडंडेंसी और विसंगतियों को कम करना","SQL लिखना","None"], a:"B", e:"नॉर्मलाइजेशन से टेबल को बेहतर तरीके से व्यवस्थित किया जाता है।"},
    {q:"1NF (First Normal Form) की शर्त क्या है?", o:["यूनिक की होना","एटॉमिक (Atomic) वैल्यू होना","कोई पार्शियल डिपेंडेंसी न होना","None"], a:"B", e:"हर सेल में केवल एक ही (अविभाज्य) वैल्यू होनी चाहिए।"},
    {q:"2NF के लिए क्या अनिवार्य है?", o:["1NF में होना और पार्शियल डिपेंडेंसी न होना","सिर्फ 1NF में होना","BCNF में होना","None"], a:"A", e:"2NF के लिए टेबल 1NF में होनी चाहिए और कोई नॉन-की एट्रिब्यूट पार्शियल डिपेंडेंट नहीं होना चाहिए।"},
    {q:"'Drop' कमांड SQL के किस भाग में आती है?", o:["DML","DDL","DCL","TCL"], a:"B", e:"Data Definition Language (DDL) स्ट्रक्चर को बदलने के लिए होती है।"},
    {q:"'Select' कमांड किसका हिस्सा है?", o:["DML/DQL","DDL","DCL","None"], a:"A", e:"डेटा को क्वेरी करने के लिए Select का उपयोग होता है।"},
    {q:"टेबल से डेटा को हटाने के लिए किस कमांड का उपयोग होता है?", o:["REMOVE","DELETE","EXIT","ERASE"], a:"B", e:"DELETE का उपयोग टेबल के अंदर के रिकॉर्ड्स हटाने के लिए होता है।"},
    {q:"पूरी टेबल और उसके स्ट्रक्चर को हटाने के लिए कमांड?", o:["DELETE","DROP","TRUNCATE","CLEAR"], a:"B", e:"DROP पूरी टेबल को ही डेटाबेस से खत्म कर देता है।"},

    {q:"ACID प्रॉपर्टी में 'A' का क्या अर्थ है?", o:["Availability","Atomicity","Authority","Access"], a:"B", e:"Atomicity का मतलब है ट्रांजेक्शन या तो पूरा होगा या बिल्कुल नहीं।"},
    {q:"ACID प्रॉपर्टी में 'C' का क्या अर्थ है?", o:["Complexity","Consistency","Concurrency","Capacity"], a:"B", e:" Consistency यह सुनिश्चित करती है कि डेटाबेस हमेशा सही स्थिति में रहे।"},
    {q:"DBA का पूर्ण रूप क्या है?", o:["Data Business Analyst","Database Administrator","Data Base Assistant","None"], a:"B", e:"डेटाबेस को कंट्रोल और मैनेज करने वाला व्यक्ति।"},
    {q:"डेटाबेस की 'Schema' क्या है?", o:["डेटा का मान","डेटाबेस का लॉजिकल स्ट्रक्चर/डिज़ाइन","यूजर का नाम","None"], a:"B", e:"स्कीमा डेटाबेस का ब्लूप्रिंट या ढांचा होता है।"},
    {q:"डेटा के बारे में डेटा (Data about Data) को क्या कहते हैं?", o:["Metadata","Hierarchy","Relation","Schema"], a:"A", e:"मेटाडेटा डेटाबेस की परिभाषाओं और गुणों को बताता है।"},
    {q:"SQL में 'Where' क्लॉज का उपयोग क्यों होता है?", o:["टेबल बनाने के लिए","शर्त (Condition) के आधार पर डेटा फिल्टर करने के लिए","जोड़ने के लिए","None"], a:"B", e:"यह खास रिकॉर्ड्स को चुनने के लिए कंडीशन लगाता है।"},
    {q:"डेटाबेस में 'Commit' का क्या काम है?", o:["बदलावों को अस्थायी बनाना","बदलावों को स्थायी (Permanent) रूप से सेव करना","डिलीट करना","None"], a:"B", e:"Commit करने के बाद ट्रांजेक्शन के बदलाव सेव हो जाते हैं।"},
    {q:"'Rollback' का क्या अर्थ है?", o:["आगे बढ़ना","पिछली सही स्थिति में वापस जाना (Undo)","सेव करना","None"], a:"B", e:"गलती होने पर Rollback से पुराने डेटा पर वापस जा सकते हैं।"},
    {q:"इनमें से कौन सा रिलेशनशिप का प्रकार है?", o:["One-to-One","One-to-Many","Many-to-Many","उपरोक्त सभी"], a:"D", e:"यह सभी एंटीटीज़ के बीच जुड़ाव के प्रकार हैं।"},
    {q:"एक स्टूडेंट के कई कोर्सेज हो सकते हैं, यह कैसा संबंध है?", o:["1:1","1:M","M:M","M:1"], a:"C", e:"चूंकि एक कोर्स में भी कई छात्र हो सकते हैं, इसलिए यह Many-to-Many है।"},
    {q:"SQL में 'Distinct' कीवर्ड का क्या उपयोग है?", o:["सब डेटा दिखाने के लिए","यूनिक (Unique) वैल्यू दिखाने के लिए","जोड़ने के लिए","None"], a:"B", e:"यह डुप्लीकेट वैल्यूज़ को हटाकर केवल यूनिक वैल्यू देता है।"},
    {q:"DML का पूर्ण रूप क्या है?", o:["Data Definition Language","Data Manipulation Language","Data Model Logic","None"], a:"B", e:"डेटा को बदलने (Insert, Update, Delete) के लिए।"},
    {q:"टेबल में नया कॉलम जोड़ने के लिए किस कमांड का उपयोग होता है?", o:["ADD","ALTER","UPDATE","CREATE"], a:"B", e:"ALTER TABLE कमांड से कॉलम जोड़ा या बदला जा सकता है।"},

    {q:"SQL में 'LIKE' ऑपरेटर किसके लिए उपयोग होता है?", o:["पैटर्न मैचिंग के लिए","जोड़ने के लिए","बराबर देखने के लिए","None"], a:"A", e:"जैसे नाम का पहला अक्षर ढूँढने के लिए LIKE 'A%' का प्रयोग।"},
    {q:"Aggregate फंक्शन का उदाहरण कौन सा है?", o:["SUM","AVG","COUNT","उपरोक्त सभी"], a:"D", e:"यह मल्टीपल रो पर गणना करके एक वैल्यू देते हैं।"},
    {q:"'Group By' क्लॉज का उपयोग किसके साथ होता है?", o:["Delete","Aggregate फंक्शन्स","Update","None"], a:"B", e:"समान डेटा को समूहों में बांटने के लिए।"},
    {q:"इनमें से कौन सा NoSQL डेटाबेस है?", o:["Oracle","MySQL","MongoDB","PostgreSQL"], a:"C", e:"MongoDB एक पॉपुलर NoSQL (Document-based) डेटाबेस है।"},
    {q:"डेटाबेस में 'View' क्या है?", o:["असली टेबल","एक वर्चुअल टेबल","एक हार्ड डिस्क","None"], a:"B", e:"व्यू एक क्वेरी का परिणाम होता है जो टेबल की तरह दिखता है।"},
    {q:"प्राइमरी की जो दो या अधिक कॉलम से मिलकर बनती है?", o:["Foreign Key","Composite Key","Simple Key","None"], a:"B", e:"दो कॉलम्स के मिश्रण से बनी यूनिक की कंपोजिट की कहलाती है।"},
    {q:"डेटाबेस एब्स्ट्रैक्शन (Abstraction) का सबसे निचला स्तर?", o:["Conceptual Level","Physical Level","View Level","Logical Level"], a:"B", e:"फिजिकल लेवल बताता है कि डेटा वास्तव में डिस्क पर कैसे स्टोर है।"},
    {q:"SQL में 'Update' कमांड का क्या काम है?", o:["नया रिकॉर्ड जोड़ना","मौजूदा रिकॉर्ड को बदलना","टेबल हटाना","None"], a:"B", e:"पुराने डेटा को अपडेट करने के लिए।"},
    {q:"'Between' ऑपरेटर का उपयोग क्यों होता है?", o:["दो वैल्यू के बीच की रेंज ढूँढने के लिए","सिर्फ एक वैल्यू के लिए","जोड़ने के लिए","None"], a:"A", e:"यह एक रेंज के अंदर के रिकॉर्ड्स सर्च करता है।"},
    {q:"डेटा इंडिपेंडेंस (Data Independence) कितने प्रकार की होती है?", o:["1","2","3","4"], a:"B", e:"Physical और Logical डेटा इंडिपेंडेंस।"},

const qLoad = document.getElementById('questions-load');
const sAns = document.getElementById('short-ans-key');
const dAns = document.getElementById('detailed-ans-key');

data.forEach((item, i) => {
    qLoad.innerHTML += `<div class="q-card">
        <strong>${i+1}. ${item.q}</strong>
        <div class="options">
            <label><input type="radio" name="q${i}" value="A"> A) ${item.o[0]}</label>
            <label><input type="radio" name="q${i}" value="B"> B) ${item.o[1]}</label>
            <label><input type="radio" name="q${i}" value="C"> C) ${item.o[2]}</label>
            <label><input type="radio" name="q${i}" value="D"> D) ${item.o[3]}</label>
        </div>
    </div>`;
    sAns.innerHTML += `<div class="ans-item">Q${i+1}:${item.a}</div>`;
    dAns.innerHTML += `<div class="print-item"><strong>${i+1}. ${item.q}</strong><br>Ans: ${item.a} | <span class="expl">व्याख्या: ${item.e}</span></div>`;
});

let time = 40 * 60;
const timerInterval = setInterval(() => {
    let m = Math.floor(time/60); let s = time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    if(time <= 0) {
        clearInterval(timerInterval);
        calculateResult();
    }
    time--;
}, 1000);

function calculateResult() {
    let score = 0;
    data.forEach((item, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && sel.value === item.a) score += 1.25;
        else if(sel) score -= 0.25;
    });
    document.getElementById('score').innerText = score.toFixed(2);
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('prn-btn').style.display = 'inline-block';
    document.getElementById('sub-btn').style.display = 'none';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}
</script>
