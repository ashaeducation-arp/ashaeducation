<script>

    {q:"Von Neumann आर्किटेक्चर में CPU और मेमोरी के बीच की बाधा को क्या कहते हैं?", o:["Memory Jam","Bottleneck","Deadlock","Bus Crash"], a:"B", e:"एक ही बस से डेटा और निर्देश ले जाने के कारण होने वाली देरी 'Bottleneck' कहलाती है।"},
    {q:"प्रोग्राम काउंटर (PC) रजिस्टर क्या स्टोर करता है?", o:["पिछला निर्देश","वर्तमान निर्देश","अगले निर्देश का पता","डेटा का पता"], a:"C", e:"PC हमेशा अगले निष्पादित होने वाले निर्देश का एड्रेस होल्ड करता है।"},
    {q:"ALU का मुख्य कार्य क्या है?", o:["कंट्रोलिंग","डेटा ट्रांसफर","गणितीय गणना (Math)","इनपुट लेना"], a:"C", e:"ALU (Arithmetic Logic Unit) जोड़, घटाव और तुलना जैसे कार्य करता है।"},
    {q:"Instruction Cycle का सही क्रम चुनें?", o:["Fetch-Execute-Decode","Decode-Fetch-Execute","Fetch-Decode-Execute","Execute-Fetch-Decode"], a:"C", e:"सबसे पहले मेमोरी से निर्देश लाना (Fetch), फिर उसे समझना (Decode) और फिर चलाना (Execute)।"},
    {q:"एक 64-बिट प्रोसेसर एक बार में कितने बाइट्स को हैंडल कर सकता है?", o:["4","8","16","64"], a:"B", e:"64 बिट्स / 8 = 8 बाइट्स।"},
    {q:"Accumulator रजिस्टर कहाँ होता है?", o:["Hard Disk","ALU","Control Unit","Input Device"], a:"B", e:"यह गणना के दौरान आने वाले परिणामों को स्टोर करता है।"},
    {q:"Control Unit को कंप्यूटर का क्या कहा जाता है?", o:["हृदय (Heart)","मस्तिष्क (Brain)","तंत्रिका तंत्र (Nervous System)","हाथ-पैर"], a:"C", e:"CU पूरे सिस्टम को कोऑर्डिनेट करता है, जैसे नर्वस सिस्टम शरीर को।"},
    {q:"RISC का पूरा नाम क्या है?", o:["Rapid Instruction Set","Reduced Instruction Set","Real Instruction Set","None"], a:"B", e:"Reduced Instruction Set Computer छोटे और तेज निर्देशों पर काम करता है।"},

    {q:"MAR का फुल फॉर्म क्या है?", o:["Memory Address Register","Memory Access Register","Main Address Rule","None"], a:"A", e:"यह मेमोरी के उस एड्रेस को होल्ड करता है जहाँ डेटा जाना है।"},
    {q:"MDR (Memory Data Register) का क्या काम है?", o:["एड्रेस रखना","डेटा को बफर करना","गणना करना","इनपुट लेना"], a:"B", e:"मेमोरी से पढ़ा गया या मेमोरी में लिखा जाने वाला डेटा MDR में होता है।"},
    {q:"Instruction Register (IR) में क्या होता है?", o:["डेटा","वर्तमान निर्देश","अगला निर्देश","पता"], a:"B", e:"IR उस निर्देश को होल्ड करता है जो अभी डिकोड या प्रोसेस हो रहा है।"},
    {q:"एड्रेस बस (Address Bus) की चौड़ाई क्या तय करती है?", o:["डेटा की गति","मेमोरी की अधिकतम क्षमता","डिस्प्ले का साइज़","इनपुट स्पीड"], a:"B", e:"बस जितनी चौड़ी होगी, CPU उतनी ही ज्यादा मेमोरी को एड्रेस कर पाएगा।"},
    {q:"Control Bus की प्रकृति कैसी होती है?", o:["एकदिशीय","द्विदिशीय (Bidirectional)","तीनदिशीय","कोई नहीं"], a:"B", e:"कंट्रोल सिग्नल्स को भेजने और फीडबैक लेने के लिए यह दोनों तरफ काम करती है।"},
    {q:"सिस्टम क्लॉक की फ्रीक्वेंसी किसमें मापते हैं?", o:["MIPS","MHz/GHz","Mbps","Pixels"], a:"B", e:"इसे हर्ट्ज़ (Hz) में मापा जाता है।"},
    {q:"L1 कैश (Cache) कहाँ होती है?", o:["मदरबोर्ड पर","CPU के भीतर","RAM के पास","Hard Drive में"], a:"B", e:"L1 कैश सबसे तेज होती है और प्रोसेसर कोर के बिल्कुल पास होती है।"},
    {q:"मेमोरी पदानुक्रम (Hierarchy) में सबसे धीमी मेमोरी कौन सी है?", o:["Cache","RAM","Secondary Storage","Registers"], a:"C", e:"हार्ड डिस्क और टेप ड्राइव सबसे धीमी लेकिन बड़ी क्षमता वाली होती हैं।"},
    {q:"Interrupt क्या है?", o:["सॉफ्टवेयर एरर","बाहरी सिग्नल जो प्रोसेसिंग रोकता है","वायरस","कंप्यूटर रीस्टार्ट"], a:"B", e:"I/O डिवाइस द्वारा CPU का ध्यान खींचने के लिए भेजा गया सिग्नल।"},
    {q:"DMA कंट्रोलर का क्या काम है?", o:["मेमोरी बढ़ाना","बिना CPU के डेटा ट्रांसफर करना","CPU को ठंडा करना","डिस्प्ले सुधारना"], a:"B", e:"Direct Memory Access से I/O डिवाइस सीधे RAM से डेटा बदल सकते हैं।"},
    {q:"Micro-operation क्या है?", o:["बड़ा प्रोग्राम","सबसे छोटा हार्डवेयर ऑपरेशन","एक गेम","प्रिंटिंग कार्य"], a:"B", e:"CPU के भीतर होने वाला एक बेसिक ऑपरेशन (जैसे रजिस्टर ट्रांसफर)।"},
    {q:"Flag Register का उपयोग क्यों होता है?", o:["नाम स्टोर करने","स्टेटस/कंडीशन बताने","फाइल डिलीट करने","गाना बजाने"], a:"B", e:"यह जीरो, कैरी या साइन जैसे स्टेटस को दर्शाता है।"},
    {q:"Buses का वह समूह जो CPU को पेरिफेरल से जोड़ता है?", o:["Internal Bus","System Bus","Expansion Bus","Data Bus"], a:"C", e:"बाहरी कार्ड और डिवाइस के लिए एक्सपेंशन बस का प्रयोग होता है।"},
    {q:"CISC प्रोसेसर में पाइपलाइनिंग करना कठिन क्यों है?", o:["निर्देशों की लंबाई समान नहीं है","स्पीड ज्यादा है","बिजली कम लगती है","साइज छोटा है"], a:"A", e:"जटिल और अलग-अलग लंबाई के निर्देशों के कारण तालमेल बिठाना मुश्किल होता है।"},
    {q:"एक क्लॉक साइकिल में कितने बिट्स ट्रांसफर होंगे, यह कौन तय करता है?", o:["Bus Width","Hard disk size","Monitor","Keyboard"], a:"A", e:"बस की चौड़ाई ही उसकी क्षमता तय करती है।"},
    {q:"मेमोरी मैपिंग (Memory Mapping) क्या है?", o:["नक्शा बनाना","I/O डिवाइस को एड्रेस देना","RAM साफ करना","CPU को बंद करना"], a:"B", e:"I/O डिवाइस को मेमोरी लोकेशन की तरह ट्रीट करना।"},
    {q:"Register Transfer Language (RTL) का उपयोग कहाँ होता है?", o:["वेबसाइट बनाने","आर्किटेक्चर वर्णन में","गेम खेलने","वीडियो एडिटिंग"], a:"B", e:"रजिस्टर्स के बीच डेटा फ्लो को दर्शाने के लिए RTL का प्रयोग होता है।"},
    {q:"Stack Pointer (SP) क्या होल्ड करता है?", o:["डेटा","स्टैक का टॉप एड्रेस","पूरा प्रोग्राम","Error"], a:"B", e:"यह स्टैक मेमोरी के सबसे ऊपरी भाग का पता रखता है।"},
    {q:"Hardwired Control Unit की क्या विशेषता है?", o:["यह तेज है","यह लचीला है","यह सॉफ्टवेयर पर चलता है","None"], a:"A", e:"हार्डवेयर गेट्स से बना होने के कारण यह बहुत तेज कार्य करता है।"},
    {q:"Microprogrammed CU किस पर आधारित होता है?", o:["सॉफ़्टवेयर कोड","कंट्रोल मेमोरी","मैकेनिकल स्विच","कैपेसिटर"], a:"B", e:"यह कंट्रोल मेमोरी में स्टोर 'माइक्रोकोड' पर चलता है।"},
    {q:"Instruction Prefetching क्या है?", o:["निर्देश डिलीट करना","अगले निर्देश को पहले ही ले आना","स्पीड कम करना","प्रिंट करना"], a:"B", e:"अगले निर्देश को पहले ही बफर में लाकर रखना।"},
    {q:"Branch Prediction का उद्देश्य क्या है?", o:["शाखा काटना","पाइपलाइन को खाली होने से बचाना","मेमोरी बढ़ाना","None"], a:"B", e:"पाइपलाइन में अगली संभावित शाखा का अनुमान लगाना।"},
    {q:"Bus Arbitration का क्या अर्थ है?", o:["बस को चलाना","तय करना कि बस का उपयोग कौन करेगा","बस खराब होना","स्पीड बढ़ाना"], a:"B", e:"जब कई डिवाइस बस मांगते हैं, तो प्राथमिकता तय करना।"},
    {q:"Synchronous Bus किस पर आधारित होती है?", o:["हैंडशेकिंग पर","कॉमन क्लॉक पर","इंटरनेट पर","रैंडम"], a:"B", e:"इसमें सभी ऑपरेशंस क्लॉक पल्स के साथ चलते हैं।"},
    {q:"Asynchronous Bus में डेटा ट्रांसफर कैसे होता है?", o:["क्लॉक से","हैंडशेकिंग सिग्नल्स से","बिना तार के","None"], a:"B", e:"यह रेडी और एक्नॉलेज सिग्नल्स पर निर्भर करता है।"},
    {q:"MIPS का पूर्ण रूप क्या है?", o:["Millions of Instructions Per Second","Main Input Per Second","Mini Instruction","None"], a:"A", e:"प्रोसेसर की परफॉरमेंस मापने की इकाई।"},
    {q:"CPU का वह हिस्सा जो एड्रेस जेनरेट करता है?", o:["ALU","Memory Management Unit (MMU)","Hard Disk","Scanner"], a:"B", e:"MMU लॉजिकल एड्रेस को फिजिकल एड्रेस में बदलता है।"},
    {q:"Write-through पॉलिसी किसमें होती है?", o:["Hard disk","Cache memory","Printer","Mouse"], a:"B", e:"कैश और मुख्य मेमोरी को एक साथ अपडेट करना।"},
    {q:"Write-back पॉलिसी का फायदा क्या है?", o:["जल्दी डिलीट करना","मेमोरी ट्रैफिक कम करना","साइज कम करना","कोई नहीं"], a:"B", e:"केवल जरूरत पड़ने पर ही मुख्य मेमोरी को अपडेट करना।"},
    {q:"Locality of Reference किससे संबंधित है?", o:["Hard disk","Cache memory","Monitor","UPS"], a:"B", e:"CPU द्वारा एक ही मेमोरी एरिया को बार-बार एक्सेस करने की प्रवृत्ति।"},
    {q:"Spatial Locality क्या है?", o:["समय के साथ","आस-पास के एड्रेस को एक्सेस करना","दूर के एड्रेस","None"], a:"B", e:"पास-पास के डेटा को एक साथ एक्सेस करना।"},
    {q:"Temporal Locality क्या है?", o:["दूरी","समान डेटा को कम समय में बार-बार एक्सेस करना","पुराना डेटा","कोई नहीं"], a:"B", e:"एक ही डेटा का बार-बार इस्तेमाल होना।"},
    {q:"Cache Hit क्या है?", o:["डेटा न मिलना","डेटा कैश में मिल जाना","कैश क्रैश होना","मेमोरी बढ़ना"], a:"B", e:"जब CPU को चाहिए और डेटा कैश में ही मिल जाए।"},
    {q:"Cache Miss क्या है?", o:["डेटा मिलना","डेटा कैश में न मिलना","कैश साफ होना","None"], a:"B", e:"जब डेटा RAM से लाना पड़े क्योंकि कैश में नहीं है।"},

    {q:"Instruction Format में 'Opcode' क्या बताता है?", o:["डेटा कहाँ है","क्या कार्य करना है (Operation)","प्रोसेसर का नाम","एड्रेस"], a:"B", e:"यह बताता है कि जोड़ना है, घटाना है या मूव करना है।"},
    {q:"Operands क्या होते हैं?", o:["प्रोसेसर के भाग","वह डेटा जिस पर कार्य होना है","निर्देश का नाम","कोई नहीं"], a:"B", e:"जिन वैल्यूज पर ऑपरेशन होता है।"},

    {q:"Direct Addressing मोड में क्या दिया जाता है?", o:["डेटा","डेटा का एड्रेस","अगला निर्देश","नाम"], a:"B", e:"इसमें मेमोरी एड्रेस सीधे निर्देश में होता है।"},

const qLoad = document.getElementById('questions-load');
const sAns = document.getElementById('short-ans-key');
const dAns = document.getElementById('detailed-ans-key');

data.forEach((item, i) => {
    qLoad.innerHTML += `<div class="q-card">
        <strong>${i+1}. ${item.q}</strong>
        <div class="options">
            <label><input type="radio" name="q${i}" value="A"> A) ${item.o[0]}</label>
            <label><input type="radio" name="q${i}" value="B"> B) ${item.o[1]}</label>
            <label><input type="radio" name="q${i}" value="C"> C) ${item.o[2]}</label>
            <label><input type="radio" name="q${i}" value="D"> D) ${item.o[3]}</label>
        </div>
    </div>`;
    sAns.innerHTML += `<div class="ans-item">Q${i+1}:${item.a}</div>`;
    dArea = dAns.innerHTML += `<div class="print-item"><strong>${i+1}. ${item.q}</strong><br>Ans: ${item.a} | <span class="expl">व्याख्या: ${item.e}</span></div>`;
});

let time = 40 * 60;
setInterval(() => {
    let m = Math.floor(time/60); let s = time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    if(time>0) time--;
}, 1000);

function calculateResult() {
    let score = 0;
    data.forEach((item, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && sel.value === item.a) score += 1.25;
        else if(sel) score -= 0.25;
    });
    document.getElementById('score').innerText = score.toFixed(2);
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('prn-btn').style.display = 'inline-block';
    document.getElementById('sub-btn').style.display = 'none';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}
</script>
