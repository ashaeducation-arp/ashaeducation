    {q:"Singly Linked List में पीछे जाना?", o:["Prev से","संभव नहीं","रिकर्सन","हेड से"], a:"B", e:"यह सिर्फ एक ही दिशा में चलती है।"},
    {q:"Array की मुख्य सीमा?", o:["इंडेक्स","फिक्स्ड साइज़","सर्च","सॉर्ट"], a:"B", e:"इसका आकार बदला नहीं जा सकता।"},
    {q:"Level 0 पर कौन होता है?", o:["Leaf","Middle","Root","None"], a:"C", e:"रूट हमेशा लेवल 0 पर होता है।"},
    {q:"Kruskal's Algorithm किसके लिए?", o:["सॉर्ट","MST","सर्च","शॉर्टेस्ट"], a:"B", e:"Minimum Spanning Tree के लिए।"},
    {q:"Dijkstra's Algorithm का उद्देश्य?", o:["MST","Shortest Path","सॉर्ट","DFS"], a:"B", e:"सबसे छोटा रास्ता ढूँढना।"},
    {q:"Infix से Postfix के लिए?", o:["Stack","Queue","Tree","Matrix"], a:"A", e:"Stack का उपयोग होता है।"},
    {q:"Space Complexity क्या है?", o:["कोड लंबाई","अतिरिक्त मेमोरी","डिस्क साइज़","स्पीड"], a:"B", e:"चलने के लिए जरूरी मेमोरी।"},
    {q:"Tail Recursion क्या है?", o:["शुरुआत में","अंत में रिकर्सिव कॉल","बिना बेस के","इनफिनिट"], a:"B", e:"अंत में होने वाला रिकर्सन।"},
    {q:"B-Tree कहाँ उपयोग होता है?", o:["RAM","डेटाबेस/फाइल सिस्टम","रजिस्टर","Stack"], a:"B", e:"स्टोरेज को तेज़ी से एक्सेस करने के लिए।"},
    {q:"सभी नोड्स को विज़िट करना?", o:["Search","Sort","Traversal","Delete"], a:"C", e:"इसे ट्रैवर्सल कहते हैं।"},
    {q:"कम्पोजिट डेटा टाइप है?", o:["int","float","Array/Struct","char"], a:"C", e:"जो दूसरों से मिलकर बने।"},
    {q:"Strictly Binary Tree में संख्या?", o:["सम","विषम (Odd)","2 की पावर","Prime"], a:"B", e:"कुल नोड्स हमेशा विषम होते हैं।"},
    {q:"Self-loop किसमें होता है?", o:["Stack","Graph","Array","Tree"], a:"B", e:"ग्राफ में खुद से जुड़ाव।"},
    {q:"बैकअप लेना क्यों जरूरी है?", o:["स्पीड","डेटा लॉस से बचाव","कोड छोटा करना","कोई नहीं"], a:"B", e:"रिकवरी के लिए जरूरी है।"}
];

const qLoad = document.getElementById('questions-load');
const sAns = document.getElementById('short-ans-key');
const dAns = document.getElementById('detailed-ans-key');

// Load Data
data.forEach((item, i) => {
    qLoad.innerHTML += `<div class="q-card">
        <strong>${i+1}. ${item.q}</strong>
        <div class="options">
            <label><input type="radio" name="q${i}" value="A"> A) ${item.o[0]}</label>
            <label><input type="radio" name="q${i}" value="B"> B) ${item.o[1]}</label>
            <label><input type="radio" name="q${i}" value="C"> C) ${item.o[2]}</label>
            <label><input type="radio" name="q${i}" value="D"> D) ${item.o[3]}</label>
        </div>
    </div>`;
    sAns.innerHTML += `<div class="ans-item">Q${i+1}:${item.a}</div>`;
    dAns.innerHTML += `<div class="print-item"><strong>${i+1}. ${item.q}</strong><br>Ans: ${item.a} | <span class="expl">व्याख्या: ${item.e}</span></div>`;
});

// Timer Logic
let time = 40 * 60;
const timerInterval = setInterval(() => {
    let m = Math.floor(time/60); let s = time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    if(time <= 0) {
        clearInterval(timerInterval);
        calculateResult();
    }
    time--;
}, 1000);

// Calculation Logic
function calculateResult() {
    let score = 0;
    data.forEach((item, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && sel.value === item.a) score += 1.25;
        else if(sel) score -= 0.25;
    });
    document.getElementById('score').innerText = score.toFixed(2);
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('prn-btn').style.display = 'inline-block';
    document.getElementById('sub-btn').style.display = 'none';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}
</script>
</body>
</html>
