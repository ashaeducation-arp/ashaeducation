    {q:"डेसीमल 15 का हेक्साडेसीमल मान क्या होगा?", o:["E","F","G","15"], a:"B", e:"15 को Hex में 'F' लिखा जाता है।"},

    {q:"हेक्साडेसीमल में 'D' का मान क्या है?", o:["11","12","13","14"], a:"C", e:"A=10, B=11, C=12, D=13।"},
    {q:"बाइनरी संख्या 1000 को डेसीमल में क्या कहेंगे?", o:["4","6","8","10"], a:"C", e:"2^3 = 8।"},

    {q:"LSB का पूर्ण रूप क्या है?", o:["Least Significant Bit","Last System Bit","Low Safe Bit","None"], a:"A", e:"सबसे दाईं ओर (Right) वाले बिट को LSB कहते हैं।"},

    {q:"हेक्साडेसीमल 'C' का बाइनरी मान क्या है?", o:["1010","1011","1100","1101"], a:"C", e:"C=12, और 12 का बाइनरी 1100 है।"},
    {q:"बाइनरी 11111 का डेसीमल मान क्या है?", o:["15","31","63","32"], a:"B", e:"(2^5 - 1) = 32 - 1 = 31।"},
    {q:"इनमें से कौन सा एक अवैध (Invalid) ऑक्टल नंबर है?", o:["127","777","812","564"], a:"C", e:"ऑक्टल में '8' अंक नहीं होता (केवल 0-7)।"},
    {q:"इनमें से कौन सा अवैध बाइनरी नंबर है?", o:["1010","111","201","000"], a:"C", e:"बाइनरी में केवल 0 और 1 होते हैं।"},

    {q:"बाइनरी 0.1 का डेसीमल मान क्या है?", o:["0.1","0.5","0.25","1.0"], a:"B", e:"2^-1 = 1/2 = 0.5।"},

    {q:"ऋणात्मक (Negative) बाइनरी नंबर को आमतौर पर कैसे दर्शाते हैं?", o:["1's Complement","2's Complement","बाइनरी 2 से","None"], a:"B", e:"मॉडर्न सिस्टम में नेगेटिव नंबर 2's Complement में स्टोर होते हैं।"},
    {q:"साइंड बाइनरी नंबर में '1' MSB क्या दर्शाता है?", o:["Positive","Negative","Zero","Overflow"], a:"B", e:"यदि सबसे पहला बिट 1 है, तो वह नंबर ऋणात्मक (Negative) है।"},
    {q:"साइंड बाइनरी में '0' MSB क्या दर्शाता है?", o:["Negative","Positive","Null","None"], a:"B", e:"0 MSB धनात्मक (Positive) संख्या को दर्शाता है।"},
    {q:"ग्रे कोड (Gray Code) को और क्या कहते हैं?", o:["Binary Code","Unit Distance Code","BCD Code","Safe Code"], a:"B", e:"चूँकि इसमें एक बार में केवल 1 बिट बदलता है।"},
    {q:"बाइनरी 1010 का ग्रे कोड क्या होगा?", o:["1111","1101","1011","0000"], a:"B", e:"बाइनरी से ग्रे कन्वर्जन के नियमों के अनुसार।"},
    {q:"Unicode कितने बिट्स का उपयोग करता है?", o:["8","16","32","दोनों B और C"], a:"D", e:"यूनिकोड UTF-16 और UTF-32 दोनों रूपों में उपलब्ध है।"},

    {q:"हेक्साडेसीमल 9 के बाद अगला अंक क्या आता है?", o:["10","A","B","F"], a:"B", e:"9 के बाद A (10) आता है।"},

    {q:"डेसीमल 0 का बाइनरी मान क्या होगा?", o:["0","1","10","00"], a:"A", e:"शून्य हमेशा शून्य रहता है।"},

    {q:"Hexadecimal से Binary के लिए कितने बिट्स के समूह बनते हैं?", o:["2","3","4","16"], a:"C", e:"Hex के एक अंक के लिए 4 बाइनरी बिट्स लगते हैं।"},

    {q:"1 निबल + 1 निबल किसके बराबर है?", o:["1 Bit","1 Byte","1 KB","None"], a:"B", e:"4 बिट + 4 बिट = 8 बिट = 1 बाइट।"},
    {q:"ASCII-7 कोड में कुल कितने कैरेक्टर हो सकते हैं?", o:["128","256","64","1024"], a:"A", e:"2^7 = 128 संभव संयोजन।"},
    {q:"ASCII-8 कोड में कुल कितने कैरेक्टर हो सकते हैं?", o:["128","256","512","None"], a:"B", e:"2^8 = 256 कैरेक्टर्स।"},
    {q:"हेक्साडेसीमल 'A0' का डेसीमल मान क्या है?", o:["100","160","170","150"], a:"B", e:"(10 * 16^1) + 0 = 160।"},
    {q:"बाइनरी 1100 को डेसीमल में क्या कहेंगे?", o:["10","11","12","13"], a:"C", e:"8 + 4 = 12।"},
    {q:"कंप्यूटर में 'Word Size' क्या दर्शाता है?", o:["एक बार में प्रोसेस होने वाले बिट्स","कंप्यूटर का वजन","स्क्रीन साइज़","None"], a:"A", e:"यह CPU की क्षमता (जैसे 32-बिट या 64-बिट) बताता है।"},
    {q:"नंबर सिस्टम का ज्ञान कंप्यूटर साइंस में क्यों जरूरी है?", o:["प्रोग्रामिंग के लिए","मेमोरी मैनेजमेंट के लिए","हार्डवेयर समझने के लिए","उपरोक्त सभी"], a:"D", e:"यह कंप्यूटर के कार्य करने का मूल आधार है।"}
];

const qLoad = document.getElementById('questions-load');
const sAns = document.getElementById('short-ans-key');
const dAns = document.getElementById('detailed-ans-key');

data.forEach((item, i) => {
    qLoad.innerHTML += `<div class="q-card">
        <strong>${i+1}. ${item.q}</strong>
        <div class="options">
            <label><input type="radio" name="q${i}" value="A"> A) ${item.o[0]}</label>
            <label><input type="radio" name="q${i}" value="B"> B) ${item.o[1]}</label>
            <label><input type="radio" name="q${i}" value="C"> C) ${item.o[2]}</label>
            <label><input type="radio" name="q${i}" value="D"> D) ${item.o[3]}</label>
        </div>
    </div>`;
    sAns.innerHTML += `<div class="ans-item">Q${i+1}:${item.a}</div>`;
    dAns.innerHTML += `<div class="print-item"><strong>${i+1}. ${item.q}</strong><br>Ans: ${item.a} | <span class="expl">व्याख्या: ${item.e}</span></div>`;
});

let time = 40 * 60;
const timerInterval = setInterval(() => {
    let m = Math.floor(time/60); let s = time%60;
    document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
    if(time <= 0) {
        clearInterval(timerInterval);
        calculateResult();
    }
    time--;
}, 1000);

function calculateResult() {
    let score = 0;
    data.forEach((item, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && sel.value === item.a) score += 1.25;
        else if(sel) score -= 0.25;
    });
    document.getElementById('score').innerText = score.toFixed(2);
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('prn-btn').style.display = 'inline-block';
    document.getElementById('sub-btn').style.display = 'none';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}
</script>
</body>
</html>
