            <div class="res-item">

            </div>
            <div class="res-item">
                <div class="res-label">ग्रेड</div>
                <div class="res-val" id="grade-val">-</div>
            </div>
        </div>

        <p id="feedback-msg" style="font-size: 1.1rem; color: #475569; margin-bottom: 30px;"></p>
        <button class="btn-action" style="background:var(--secondary)" onclick="window.print()">रिपोर्ट डाउनलोड करें</button>
